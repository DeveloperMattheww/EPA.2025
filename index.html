<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kanblan</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <header>
    </header>
    <main>
        <div id="menu-login">
            <div class="info-site">
                <img src="resources/images/logoKB_branca.png" alt="">
                <h1>Kanblan</h1>
                <p>Kanblan, o projeto INOVADOR. Seguindo a estratégia de otimização de fluxo japonesa Kanban, o Kanblan busca fazer com que seu serviço seja o mais dinâmico, prático e funcional possível. Use Kanblan, use a dinamicidade e a praticidade.</p>
            </div>
            <div class="login-site">
                <form action="login-form">
                    <label for="username">Usuário/E-mail</label>
                    <input type="text" id="username" name="username">

                    <label for="password">Senha</label>
                    <input type="password" name="password" id="password">
                    
                    <div class="forgot-password">
                        <a href="">Esqueceu a senha?</a>
                    </div>
                </form>
                <div class="form-buttons">
                    <button id="btn-login">Login</button>
                    <button id="btn-register">Cadastre-se</button>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
