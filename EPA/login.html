<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./style/login.css">
</head>

        <!-- Login -->
<body>
    <div class="header-cinza"><img src="style/img/lua.png" alt="Imagem Lua"></div>

        <form>
            <div>

            <div class="input-dados">
                <label for="input-user">Usuário/E-mail</label>
                <input id="input-user" type="text" name="input-user">
            </div>

            <div class="input-dados">
                <label for="input-senha">Senha</label>
                    <input id="input-senha" type="text" name="input-senha">
                    <img src="style/img/ocultar-senha-preto.png" alt="" id="icone-senha">

                <div class="div-caixa-senha">
                    <a href="#">Esqueceu a senha ?</a>
                </div>
            </div>

            <div class="div-buttons">
                <button class="button login">Login</button>
                <button class="button cadastro">Cadastre-se</button>
            </div>
            
            </div>
        </form>
</body>


</html>
